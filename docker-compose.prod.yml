services:
  db:
    image: postgres:16-alpine
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: blitz_chat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: blitz_chat_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blitz_chat"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://blitz_chat:${POSTGRES_PASSWORD}@db/blitz_chat_prod
      DATABASE_SSL: "false"
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?set SECRET_KEY_BASE in .env}
      PHX_HOST: ${PHX_HOST:?set PHX_HOST in .env}
      PHX_SERVER: "true"
      PORT: "4000"
      SENTRY_DSN: ${SENTRY_DSN:-}
    expose:
      - "4000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      PHX_HOST: ${PHX_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  db_data:
  caddy_data:
  caddy_config:
